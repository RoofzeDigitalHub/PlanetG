<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Section</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- 🔥 External CSS -->
<link rel="stylesheet" href="/planetG/contactpage/contact.css?v=20260421">


</head>

<body>

<section class="contact-section">
<div class="container">
<div class="row g-5">

<!-- LEFT -->
<div class="col-lg-6">

<h2 class="contact-title">Send Your Message</h2>
<p class="contact-text">We’d love to hear from you. Reach out anytime.</p>

<div class="contact-card">

<div class="contact-img">
<iframe class="contact-map-frame"
src="https://www.google.com/maps?q=Andheri%20West%20Mumbai&z=14&output=embed">
</iframe>

<a class="contact-map-link"
href="https://www.google.com/maps?q=Andheri%20West%20Mumbai"
target="_blank">Open in Maps</a>
</div>

<div class="contact-info">
<div class="info-item">
<h6>We're Open</h6>
<p>Daily: 10 am - 9 pm</p>
</div>

<div class="info-item">
<h6>Call</h6>
<p>9879232854</p>
</div>
</div>

</div>

</div>

<!-- RIGHT FORM -->
<div class="col-lg-6">

<form id="contactForm" class="contact-form" action="/planetG/contactpage/contact-submit.php" method="POST">

<input type="text" class="form-control" name="name" placeholder="Your Name" required>

<input type="email" class="form-control" name="email" placeholder="Your Email" required>

<input type="text" class="form-control" name="phone" placeholder="Your Phone" required>

<textarea class="form-control message-box" name="message" placeholder="Your Message" required></textarea>

<p id="formStatus" class="contact-form-status" hidden></p>

<button class="send-btn" type="submit" id="sendBtn">
SEND MESSAGE
</button>

</form>

</div>

</div>
</div>
</section>

<!-- JS SAME -->

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = this;
    const statusBox = document.getElementById("formStatus");
    const sendBtn = document.getElementById("sendBtn");

    let formData = new FormData(form);

    sendBtn.disabled = true;
    sendBtn.innerText = "Sending...";

    try {
        let response = await fetch(form.action, {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        statusBox.hidden = false;

        if (data.status === "success") {
            statusBox.style.color = "green";
            statusBox.innerText = data.message;
            form.reset();
        } else {
            statusBox.style.color = "red";
            statusBox.innerText = data.message;
        }

    } catch (error) {
        statusBox.hidden = false;
        statusBox.style.color = "red";
        statusBox.innerText = "Server error!";
    } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = "SEND MESSAGE";
    }
});
</script>

</body>
</html>
