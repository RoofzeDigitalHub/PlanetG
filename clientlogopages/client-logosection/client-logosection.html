<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Valuable Clients</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/planetG/clientlogopages/client-logosection/client-logosection.css">
    <link rel="stylesheet" href="/planetG/clientlogopages/client-logosection/client-logosection-override.css">
</head>
<body>

<section class="client-logo-section">
    <div class="container">
        
        <div class="client-logo-heading">
            <span class="client-logo-pill">Our Valuable Clients</span>
            <h2 class="client-logo-title">Brands that trust PlanetG</h2>
            <p class="client-logo-copy">
                A curated showcase of clients featured on this page.
            </p>
        </div>

        <div class="client-logo-grid">
            <div class="client-logo-card" style="animation-delay: 0.02s;">
                <img src="/planetG/assets/AP-new.png" alt="AP" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.05s;">
                <img src="/planetG/assets/fortune-new.png" alt="Fortune" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.08s;">
                <img src="/planetG/assets/SRL-New.png" alt="SRL" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.11s;">
                <img src="/planetG/assets/zandu-news.png" alt="Zandu" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.14s;">
                <img src="/planetG/assets/p-new.png" alt="P" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.17s;">
                <img src="/planetG/assets/pal-new.png" alt="PAL" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.20s;">
                <img src="/planetG/assets/pc-new.png" alt="PC" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.23s;">
                <img src="/planetG/assets/pfi-new.png" alt="PFI" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.26s;">
                <img src="/planetG/assets/pi-new.png" alt="PI" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.29s;">
                <img src="/planetG/assets/ghcl-new.png" alt="GHCL" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.32s;">
                <img src="/planetG/assets/gb-new.png" alt="GB" class="client-logo-image">
            </div>

            <div class="client-logo-card" style="animation-delay: 0.35s;">
                <img src="/planetG/assets/h-new.png" alt="H" class="client-logo-image">
            </div>

        </div>

        <div class="client-logo-button-wrapper">
            <a href="/planetG/contactpage/index/index.html" class="btn-view-clients">
                Get In Touch
            </a>
        </div>

    </div>
</section>

</body>
</html>
