<!-- Modal HTML -->
<div class="gallery-modal" id="galleryModal" role="dialog" aria-modal="true" aria-label="Image gallery">
  <div class="gallery-modal-backdrop"></div>
  <div class="gallery-modal-panel">
    <button class="gallery-modal-close" aria-label="Close modal">&times;</button>
    <img class="gallery-modal-image" src="" alt="Gallery preview">
    <div class="gallery-modal-caption"></div>
  </div>
</div>

<script>
(function() {
  const modal = document.getElementById('galleryModal');
  const modalImage = modal.querySelector('.gallery-modal-image');
  const modalCaption = modal.querySelector('.gallery-modal-caption');
  const closeBtn = modal.querySelector('.gallery-modal-close');
  const backdrop = modal.querySelector('.gallery-modal-backdrop');
  
  const galleryCards = document.querySelectorAll('.gallery-card');
  
  function openModal(imageUrl, captionText) {
    modalImage.src = imageUrl;
    modalImage.alt = captionText;
    modalCaption.textContent = captionText;
    modal.classList.add('is-active');
    document.body.classList.add('gallery-modal-open');
    document.body.style.overflow = 'hidden';
  }
  
  function closeModal() {
    modal.classList.remove('is-active');
    document.body.classList.remove('gallery-modal-open');
    document.body.style.overflow = '';
    setTimeout(() => {
      if (!modal.classList.contains('is-active')) {
        modalImage.src = '';
        modalCaption.textContent = '';
      }
    }, 300);
  }
  
  galleryCards.forEach(card => {
    card.addEventListener('click', (e) => {
      e.preventDefault();
      const imageUrl = card.getAttribute('data-gallery-image');
      const caption = card.getAttribute('data-gallery-caption') || 'Gallery Image';
      if (imageUrl) {
        openModal(imageUrl, caption);
      }
    });
  });
  
  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', closeModal);
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('is-active')) {
      closeModal();
    }
  });
})();
</script>
