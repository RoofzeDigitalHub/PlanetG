<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/planetG/pagesection/gallery/Gy_image/Gy_image.css">
</head>

<body>

<section class="services-section">
<div class="container">
<div class="row g-4">

<!-- CARD 1 -->
<div class="col-md-4">
<button
  type="button"
  class="service-card gallery-card"
  data-gallery-image="/planetG/assets/ge3.jpg"
  data-gallery-caption="Garden Design"
  aria-label="Open Garden Design image"
>
<img src="/planetG/assets/2025-07-09.webp" alt="Garden Design">
<div class="service-overlay">
<span class="gallery-view-btn">VIEW</span>
</div>
</button>
</div>

<!-- CARD 2 -->
<div class="col-md-4">
<button
  type="button"
  class="service-card gallery-card"
  data-gallery-image="/planetG/assets/ge7.jpg"
  data-gallery-caption="Garden Irrigation"
  aria-label="Open Garden Irrigation image"
>
<img src="/planetG/assets/2025-07-09.webp" alt="Garden Irrigation">
<div class="service-overlay">
<span class="gallery-view-btn">VIEW</span>
</div>
</button>
</div>

<!-- CARD 3 -->
<div class="col-md-4">
<button
  type="button"
  class="service-card gallery-card"
  data-gallery-image="/planetG/assets/ge8.jpg"
  data-gallery-caption="Plant Selection"
  aria-label="Open Plant Selection image"
>
<img src="/planetG/assets/ge8.jpg" alt="Plant Selection">
<div class="service-overlay">
<span class="gallery-view-btn">VIEW</span>
</div>
</button>
</div>

</div>
</div>
</section>

</body>
</html>
