<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Valuable Clients | Client Logo Section</title>
  <!-- External CSS (alag file) -->
  <link rel="stylesheet" href="/planetG/homepage/client_logo/client_logo.css">
</head>
<body>

<section class="client-logo-section" id="clients">
  <div class="container">
    <div class="client-logo-heading">
      <div class="client-logo-pill">Our Valuable Clients</div>
    </div>

    <div class="client-logo-grid">
      <article class="client-logo-card">
        <img src="/planetG/assets/AP-new.png" alt="ACCRA PAC" class="client-logo-image" loading="lazy">
      </article>
      <article class="client-logo-card">
        <img src="/planetG/assets/ghcl-new.png" alt="GHCL" class="client-logo-image" loading="lazy">
      </article>
      <article class="client-logo-card">
        <img src="/planetG/assets/pal-new.png" alt="Parekh Aluminex Limited" class="client-logo-image" loading="lazy">
      </article>

      <article class="client-logo-card">
        <img src="/planetG/assets/p-new.png" alt="Prakash Steelage Ltd" class="client-logo-image" loading="lazy">
      </article>
      <article class="client-logo-card">
        <img src="/planetG/assets/pc-new.png" alt="Pidilite" class="client-logo-image" loading="lazy">
      </article>
      <article class="client-logo-card">
        <img src="/planetG/assets/pfi-new.png" alt="Zandu" class="client-logo-image" loading="lazy">
      </article>
    </div>

    <div class="client-logo-button-wrapper">
      <a
        class="btn-view-clients"
        href="/planetG/clientlogopages/index/index.html"
        aria-label="View all featured clients"
      >
        View All Clients
      </a>
    </div>
  </div>
</section>

</body>
</html>
