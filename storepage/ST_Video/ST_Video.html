<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<link rel="stylesheet" href="/planetG/storepage/ST_Video/ST_Video.css">
</head>

<body>

<section class="services-section">

<div class="container">

<div class="card-wrapper row g-4 justify-content-center">

<!-- CARD 1 -->
<div class="col-lg-6 d-flex">
<article
class="service-card store-video-card"
data-store-video-src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
data-store-video-title="Planet G Store"
data-store-video-location="Andheri West, Mumbai"
tabindex="0"
role="button"
aria-label="Play Planet G Store video from Andheri West, Mumbai">

<video autoplay muted loop playsinline preload="metadata">
<source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
</video>

<div class="store-video-shade"></div>

<span class="store-video-play" aria-hidden="true">
<i class="bi bi-play-fill"></i>
</span>

<div class="store-video-info">
<div>
<small>Name</small>
<h5>Planet G Store</h5>
</div>

<div>
<small>Location</small>
<h5>Andheri West, Mumbai</h5>
</div>

<div class="store-video-arrow">
<i class="bi bi-box-arrow-up-right"></i>
</div>
</div>

</article>
</div>

<!-- CARD 2 -->
<div class="col-lg-6 d-flex">
<article
class="service-card store-video-card"
data-store-video-src="https://www.w3schools.com/html/movie.mp4"
data-store-video-title="Planet G Store"
data-store-video-location="Andheri West, Mumbai"
tabindex="0"
role="button"
aria-label="Play Planet G Store video from Andheri West, Mumbai">

<video autoplay muted loop playsinline preload="metadata">
<source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
</video>

<div class="store-video-shade"></div>

<span class="store-video-play" aria-hidden="true">
<i class="bi bi-play-fill"></i>
</span>

<div class="store-video-info">
<div>
<small>Name</small>
<h5>Planet G Store</h5>
</div>

<div>
<small>Location</small>
<h5>Andheri West, Mumbai</h5>
</div>

<div class="store-video-arrow">
<i class="bi bi-box-arrow-up-right"></i>
</div>
</div>

</article>
</div>

<!-- CARD 3 -->
<div class="col-lg-8 d-flex mx-lg-auto">
<article
class="service-card service-card--feature store-video-card"
data-store-video-src="https://www.w3schools.com/html/mov_bbb.mp4"
data-store-video-title="Planet G Store"
data-store-video-location="Andheri West, Mumbai"
tabindex="0"
role="button"
aria-label="Play PlanetG Store video from Andheri West, Mumbai">

<video autoplay muted loop playsinline preload="metadata">
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<div class="store-video-shade"></div>

<span class="store-video-play" aria-hidden="true">
<i class="bi bi-play-fill"></i>
</span>

<div class="store-video-info">
<div>
<small>Name</small>
<h5>PlanetG Store</h5>
</div>

<div>
<small>Location</small>
<h5>Andheri West, Mumbai</h5>
</div>

<div class="store-video-arrow">
<i class="bi bi-box-arrow-up-right"></i>
</div>
</div>

</article>
</div>

</div>

</div>

</section>

</body>
</html>
